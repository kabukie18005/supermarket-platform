<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMart — Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #1a6b3c;
            --green-light: #2d9e5f;
            --green-pale: #e8f5ee;
            --gold: #d4a017;
            --dark: #0f1f15;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Glowing background circles */
        body::before {
            content: '';
            position: absolute;
            top: -150px; right: -150px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(45,158,95,0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -150px; left: -100px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212,160,23,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
        }
        .brand span { color: var(--gold); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 60px 48px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 100px; height: 100px;
            background: var(--green-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 48px;
            box-shadow: 0 0 40px rgba(45,158,95,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(45,158,95,0.5); }
            50% { box-shadow: 0 0 70px rgba(45,158,95,0.8); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 12px;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .details {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-around;
            gap: 16px;
        }

        .detail-item { text-align: center; }
        .detail-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .detail-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 700;
        }

        .btn {
            display: inline-block;
            background: var(--green-light);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            margin: 8px;
        }
        .btn:hover {
            background: #3ab870;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Confetti dots */
        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- Confetti dots -->
<div class="confetti" style="left:10%; background:#d4a017; animation-duration:3s; animation-delay:0s; top:0;"></div>
<div class="confetti" style="left:25%; background:#2d9e5f; animation-duration:4s; animation-delay:0.5s; top:0;"></div>
<div class="confetti" style="left:40%; background:#fff; animation-duration:3.5s; animation-delay:1s; top:0;"></div>
<div class="confetti" style="left:60%; background:#d4a017; animation-duration:5s; animation-delay:0.2s; top:0;"></div>
<div class="confetti" style="left:75%; background:#2d9e5f; animation-duration:4.5s; animation-delay:0.8s; top:0;"></div>
<div class="confetti" style="left:90%; background:#fff; animation-duration:3.2s; animation-delay:1.5s; top:0;"></div>

<header>
    <a href="{% url 'product_list' %}" class="brand">Fresh<span>Mart</span></a>
</header>

<main>
    <div class="card">
        <div class="icon-wrap">✓</div>
        <h1>Payment Successful!</h1>
        <p class="subtitle">Thank you for shopping at FreshMart, your order has been placed and will be delivered fresh to your door shortly.</p>

        <div class="details">
            <div class="detail-item">
                <div class="detail-label">Status</div>
                <div class="detail-value">Confirmed</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Delivery</div>
                <div class="detail-value">Today</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Payment</div>
                <div class="detail-value">Paystack</div>
            </div>
        </div>

        <div>
            <a href="{% url 'product_list' %}" class="btn">Continue Shopping</a>
            <a href="{% url 'view_cart' %}" class="btn btn-outline">View Cart</a>
        </div>
    </div>
</main>

</body>
</html>
